<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MegaG - ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --brand-blue: #3b82f6;
            --brand-blue-hover: #2563eb;
            --bg-deep: #1e293b;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #f8fafc;
            --input-bg: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background-color: var(--bg-deep);
        }

        /* Background com Overlay */
        .bg-overlay {
            position: fixed;
            inset: 0;
            background-image: url("../assets/images/bg_fullhd.png");
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .bg-tint {
            position: fixed;
            inset: 0;
            background: rgba(30, 41, 59, 0.85); /* Tom azulado do print */
            z-index: -1;
        }

        .bg-gradient-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(to right, rgba(23, 37, 84, 0.95), transparent);
            z-index: -1;
        }

        .auth-container {
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4rem;
            position: relative;
            z-index: 1;
        }

        /* Lado Esquerdo */
        .brand-info {
            flex: 1;
            color: white;
        }

        .brand-info h1 {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .brand-info h1 span {
            color: var(--brand-blue);
        }

        .brand-info p {
            font-size: 1.15rem;
            color: rgba(255, 255, 255, 0.7);
            max-width: 500px;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .badge-group {
            display: flex;
            gap: 12px;
            margin-bottom: 3rem;
        }

        .badge-modern {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 20px;
            border-radius: 999px;
            color: white;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(8px);
        }

        .badge-modern i {
            color: var(--brand-blue);
        }

        .tip-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 12px;
            display: inline-block;
            backdrop-filter: blur(4px);
        }

        .tip-box p {
            margin: 0;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .tip-box span {
            color: var(--brand-blue);
            font-weight: 700;
            margin-right: 8px;
        }

        /* Lado Direito - Card */
        .login-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 440px;
            padding: 3.5rem;
            border-radius: 40px; /* Cantos bem arredondados como solicitado */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .card-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-box {
            width: 64px;
            height: 64px;
            background: white;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .logo-box img {
            max-width: 38px;
            height: auto;
        }

        .card-header h3 {
            font-weight: 900;
            color: var(--text-main);
            margin-bottom: 4px;
            text-transform: uppercase;
            font-size: 1.5rem;
        }

        .card-header p {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .form-label {
            font-size: 0.7rem;
            font-weight: 900;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-left: 4px;
        }

        .input-group-modern {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-group-modern i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--brand-blue);
            font-size: 1.2rem;
            z-index: 10;
        }

        .form-control-modern {
            background: rgba(226, 232, 240, 0.5);
            border: none;
            padding: 14px 14px 14px 48px;
            border-radius: 16px;
            font-weight: 700;
            color: var(--text-main);
            width: 100%;
            outline: none;
            transition: all 0.2s;
        }

        .form-control-modern:focus {
            background: white;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .form-control-modern::placeholder {
            color: #94a3b8;
            text-transform: uppercase;
        }

        .forgot-pass {
            display: block;
            text-align: right;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--brand-blue);
            text-decoration: none;
            margin-top: -0.5rem;
            margin-bottom: 1.5rem;
        }

        .btn-entrar {
            width: 100%;
            background: var(--brand-blue-hover);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.85rem;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
            transition: all 0.2s;
        }

        .btn-entrar:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.4);
        }

        .btn-entrar:active {
            transform: translateY(0);
        }

        .footer-text {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.6;
        }

        #msgErro {
            background: #fef2f2;
            border: 1px solid #fee2e2;
            color: #ef4444;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-top: 1rem;
            text-align: center;
        }

        /* Responsivo */
        @media (max-width: 992px) {
            .brand-info {
                display: none;
            }
            .auth-container {
                justify-content: center;
            }
        }
    </style>
</head>

<body>

<div class="bg-overlay"></div>
<div class="bg-tint"></div>
<div class="bg-gradient-overlay"></div>

<div class="auth-container">
    <!-- Painel Esquerdo -->
    <div class="brand-info">
        <h1>BEM VINDO AO <br> <span>MEGAG - ERP</span></h1>
        <p>Acesso ao ambiente do MegaG - ERP. Entre com seu usuário do Consinco para continuar.</p>
        
        <div class="badge-group">
            <div class="badge-modern"><i class="bi bi-zap-fill"></i> Rápido</div>
            <div class="badge-modern"><i class="bi bi-shield-fill-check"></i> Seguro</div>
            <div class="badge-modern"><i class="bi bi-globe"></i> Operação</div>
        </div>

        <div class="tip-box">
            <p><span>Dica:</span> mantenha seu usuário em maiúsculas (ex: CONSINCO).</p>
        </div>
    </div>

    <!-- Painel Direito -->
    <div class="login-card">
        <div class="card-header">
            <div class="logo-box">
                <img src="../assets/images/logo.png" alt="MegaG Logo">
            </div>
            <h3>MEGAG - ERP</h3>
            <p>Acesso Restrito</p>
        </div>

        <form id="formLogin">
            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <div class="input-group-modern">
                    <i class="bi bi-person-fill"></i>
                    <input type="text" id="usuario" class="form-control-modern" placeholder="CONSINCO" required autofocus>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Senha</label>
                <div class="input-group-modern">
                    <i class="bi bi-lock-fill"></i>
                    <input type="password" id="senha" class="form-control-modern" placeholder="••••••••" required>
                </div>
            </div>

            <a href="mailto:suporte@megag.com.br" class="forgot-pass">Esqueci a senha</a>

            <button type="submit" id="btnEntrar" class="btn-entrar">ENTRAR</button>
        </form>

        <div id="msgErro" style="display:none"></div>

        <div class="footer-text">
            © MEGAG - ERP — AMBIENTE OPERACIONAL
        </div>
    </div>
</div>

<script>
    // Lógica original de login preservada
    document.getElementById('formLogin').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('btnEntrar');
        const msg = document.getElementById('msgErro');
        const usuario = document.getElementById('usuario').value;
        const senha = document.getElementById('senha').value;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>ENTRANDO...';
        msg.style.display = 'none';

        try {
            const resp = await fetch('../login_action.php', {
                credentials: 'same-origin',
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario, senha })
            });
            
            let json;
            const textResp = await resp.text();
            try {
                json = JSON.parse(textResp);
            } catch (err) {
                console.error("Resposta inválida:", textResp);
                throw new Error("Erro no servidor.");
            }

            if (json.sucesso) {
                window.location.href = '../index.php'; 
            } else {
                msg.innerText = json.erro || 'Erro ao fazer login';
                msg.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'ENTRAR';
            }
        } catch (error) {
            msg.innerText = 'Erro de conexão com o servidor.';
            msg.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = 'ENTRAR';
        }
    });
</script>

</body>
</html>
